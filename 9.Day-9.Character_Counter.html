<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter</title>
</head>
<style>
    body{
        display: flex;
        justify-content: center;
        min-height: 100vh;
        align-items: center;
        overflow: hidden;
        background: #000;
    }
    label{
        position: relative;
    }

    input{
        font-size: 1.4rem;
        padding: 0.8rem 1.7rem 0.8rem;
        background: transparent;
        color: #fff;
        border-bottom: 1.5px solid rgb(44, 31, 222);
        transition: all 0.4s;
        outline: none;
    }

    label span{
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
        width: 1.6rem;
        height: 1.6rem;
        display: flex;
        /* padding: 2px 2px; */
        margin: -1px 20px ;
        color: #fff;
        background: rgba(245,248,255,0.2);
        align-items: center;
        justify-content: center;
        font-size: 0.8rem;
        border-radius: 5px;
    }

    input:focus{
        border-color: #fff;
    }

    input::placeholder{
        color: rgba(245,248,255,0.4);
    }

</style>
<body>
    <label for="">
        <input type="text" placeholder="Enter Text" maxlength="20">
        <span></span>
    </label>
</body>

<script>
    const input = document.querySelector('input');
    const counter = document.querySelector('label span')
    const maxLength = input.getAttribute('maxlength');

    input.addEventListener('input',  event => {
        const valueLength = event.target.value.length;

        const leftCharLength = maxLength - valueLength;

        if (leftCharLength < 0) return;
        counter.innerText = leftCharLength
    });
</script>
</html>
