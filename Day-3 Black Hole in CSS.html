<div id="canvas-container"></div>

<style>
    body { 
        margin: 0; 
        background-color: #000; 
        overflow: hidden; 
    }
    #canvas-container { 
        width: 100vw; 
        height: 100vh; 
    }
</style>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // 1. SCENE & RENDERER SETUP
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 2. BLOOM EFFECT (The "Glow")
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight), 
        1.5, // Strength
        0.4, // Radius
        0.85 // Threshold
    );
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // 3. THE BLACK HOLE (Event Horizon)
    const holeGeo = new THREE.SphereGeometry(2, 64, 64);
    const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const blackHole = new THREE.Mesh(holeGeo, holeMat);
    scene.add(blackHole);

    // 4. THE ACCRETION DISK (Using a Custom Gas Shader)
    const diskGeo = new THREE.TorusGeometry(5, 1.5, 2, 120);
    const diskMat = new THREE.ShaderMaterial({
        uniforms: {
            time: { value: 0 }
        },
        vertexShader: `
            varying vec2 vUv;
            varying vec3 vPos;
            void main() {
                vUv = uv;
                vPos = position;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `,
        fragmentShader: `
            uniform float time;
            varying vec2 vUv;
            varying vec3 vPos;

            // Pseudo-random noise for gas texture
            float noise(vec2 p) {
                return fract(sin(dot(p, vec2(12.9, 78.2))) * 43758.5);
            }

            void main() {
                float dist = length(vPos.xz);
                float ring = smoothstep(7.0, 3.5, dist); // Fades edges
                
                // Colors: Bright white center to deep orange edge
                vec3 orange = vec3(1.0, 0.4, 0.0);
                vec3 yellow = vec3(1.0, 0.9, 0.3);
                vec3 color = mix(orange, yellow, ring);

                // Swirling effect
                float n = noise(vUv * 15.0 - time * 0.8);
                float finalAlpha = ring * (0.7 + n * 0.3);

                gl_FragColor = vec4(color, finalAlpha);
            }
        `,
        transparent: true,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending
    });

    const disk = new THREE.Mesh(diskGeo, diskMat);
    disk.rotation.x = Math.PI / 2.1; // Cinematic tilt
    scene.add(disk);

    // 5. STARFIELD BACKGROUND
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for(let i=0; i<10000; i++) {
        starCoords.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*400);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
    scene.add(new THREE.Points(starGeo, starMat));

    camera.position.z = 15;
    camera.position.y = 3;

    // 6. ANIMATION LOOP
    function animate() {
        requestAnimationFrame(animate);
        const t = performance.now() * 0.001;

        diskMat.uniforms.time.value = t;
        disk.rotation.z += 0.005; // Disk spin
        
        // Slow camera orbit
        camera.position.x = Math.cos(t * 0.1) * 15;
        camera.position.z = Math.sin(t * 0.1) * 15;
        camera.lookAt(0, 0, 0);

        composer.render();
    }

    animate();

    // Handle Window Resizing
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
