<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinematic Three.js Solar System</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Celestial Engine</h1>
        <p>Bloom Enabled | Orbit Controls Active</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- Post Processing (The Glow) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.2; // Adjust for "heat" intensity
        bloomPass.radius = 0.1;

        const composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const sunLight = new THREE.PointLight(0xffffff, 500, 300); // High intensity for realism
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x111111));

        // --- The Glowing Sun ---
        const sunGeo = new THREE.SphereGeometry(6, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // --- Stars ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<15000; i++) {
            starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 }));
        scene.add(stars);

        // --- Planets Factory ---
        const planets = [];
        function createPlanet(size, color, distance, speed, hasRings = false) {
            const pivot = new THREE.Object3D();
            scene.add(pivot);

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(size, 32, 32),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.7 })
            );
            mesh.position.x = distance;
            pivot.add(mesh);

            if (hasRings) {
                const ringGeo = new THREE.RingGeometry(size + 1, size + 3, 64);
                const ringMat = new THREE.MeshBasicMaterial({ color: 0x887766, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.5;
                mesh.add(ring);
            }

            // Orbital Path Line
            const pathGeo = new THREE.RingGeometry(distance - 0.1, distance + 0.1, 128);
            const pathMat = new THREE.MeshBasicMaterial({ color: 0xffffff, opacity: 0.05, transparent: true, side: THREE.DoubleSide });
            const path = new THREE.Mesh(pathGeo, pathMat);
            path.rotation.x = Math.PI / 2;
            scene.add(path);

            return { pivot, mesh, speed };
        }

        // Add planets: size, color, distance, speed, rings?
        planets.push(createPlanet(0.8, 0xaaaaaa, 12, 0.02));     // Mercury
        planets.push(createPlanet(1.5, 0xeebf87, 18, 0.012));    // Venus
        planets.push(createPlanet(1.6, 0x2277ff, 25, 0.01));     // Earth
        planets.push(createPlanet(1.2, 0xcc4422, 32, 0.008));    // Mars
        planets.push(createPlanet(3.5, 0xbcafb2, 45, 0.004, true)); // Saturn with Rings

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            sun.rotation.y += 0.005;
            planets.forEach(p => {
                p.pivot.rotation.y += p.speed;
                p.mesh.rotation.y += 0.01;
            });

            controls.update();
            composer.render(); // Using composer instead of renderer
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
