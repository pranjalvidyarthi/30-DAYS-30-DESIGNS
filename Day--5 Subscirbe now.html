<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Space Subscribe Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body, html {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none; /* Let clicks pass through if needed, except for the button */
}

.glass-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 3rem;
    border-radius: 20px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    pointer-events: auto;
}

h1 { color: #fff; margin-bottom: 0.5rem; letter-spacing: 2px; }
p { color: #aaa; margin-bottom: 2rem; }

.sub-btn {
    background: linear-gradient(45deg, #ff0055, #ff5500);
    border: none;
    padding: 15px 40px;
    color: white;
    font-weight: bold;
    border-radius: 50px;
    cursor: pointer;
    font-size: 1.2rem;
    transition: transform 0.3s ease;
    box-shadow: 0 0 20px rgba(255, 0, 85, 0.5);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0.7); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 0, 85, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 0, 85, 0); }
}
/* ... keep previous body and pulse styles ... */

.profile-img-container {
    width: 120px;
    height: 120px;
    margin: 0 auto 1.5rem;
    border-radius: 50%;
    padding: 5px;
    background: linear-gradient(45deg, #ff0055, #00d4ff);
    box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
}

.profile-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #000;
}

.tagline {
    color: #00d4ff !important;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 0.9rem;
    margin-top: -10px;
}

.stats-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin: 2rem 0;
}

.stat-item {
    display: flex;
    flex-direction: column;
}

.stat-num {
    color: #fff;
    font-size: 1.5rem;
    font-weight: 800;
}

.stat-label {
    color: #888;
    font-size: 0.75rem;
    text-transform: uppercase;
}

.stat-line {
    width: 1px;
    height: 30px;
    background: rgba(255, 255, 255, 0.2);
}
</style>
<body>
 <div class="overlay">
    <div class="glass-card">
        <div class="profile-header">
            <div class="profile-img-container">
                <img src="https://pranjalvidyarthi.github.io/assets/pranjalvidyarthi-B6_IITSx.jpg" alt="Pranjal Vidyarthi" class="profile-img">
            </div>
            <h1>Pranjal Vidyarthi</h1>
            <p class="tagline">The Creative Coder</p>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <span class="stat-num">812</span>
                <span class="stat-label">Subscribers</span>
            </div>
            <div class="stat-line"></div>
            <div class="stat-item">
                <span class="stat-num">100+</span>
                <span class="stat-label">Projects</span>
            </div>
        </div>

        <button class="sub-btn">SUBSCRIBE</button>
    </div>
</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, stars, starGeo;

function init() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.z = 1;
    camera.rotation.x = Math.PI / 2;

    renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Create Star Geometry
    starGeo = new THREE.BufferGeometry();
    let positions = new Float32Array(6000); // 2000 stars * 3 (x, y, z)
    
    for (let i = 0; i < 6000; i++) {
        positions[i] = Math.random() * 600 - 300;
    }
    
    starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    // Star Material
    let sprite = new THREE.TextureLoader().load('https://threejs.org/examples/textures/sprites/disc.png');
    let starMaterial = new THREE.PointsMaterial({
        color: 0xaaaaaa,
        size: 0.7,
        map: sprite,
        transparent: true
    });

    stars = new THREE.Points(starGeo, starMaterial);
    scene.add(stars);

    animate();
}

function animate() {
    let positions = starGeo.attributes.position.array;
    
    for (let i = 1; i < 6000; i += 3) {
        positions[i] -= 0.9; // Speed of movement
        
        if (positions[i] < -200) {
            positions[i] = 200; // Reset star to the back
        }
    }
    
    starGeo.attributes.position.needsUpdate = true;
    stars.rotation.y += 0.002; // Slight rotation for depth

    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

// Handle Window Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

init();

const card = document.querySelector('.glass-card');

document.addEventListener('mousemove', (e) => {
    let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
    let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
    card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
});

// Reset position when mouse leaves
document.addEventListener('mouseleave', () => {
    card.style.transform = `rotateY(0deg) rotateX(0deg)`;
});
    </script>
</body>
</html>
